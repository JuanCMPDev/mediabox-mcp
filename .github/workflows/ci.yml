name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Typecheck, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspaces
        run: npm ci

      - name: Build @mediabox/contracts
        run: npm run build -w @mediabox/contracts

      - name: Build @mediabox/chat-core
        run: npm run build -w @mediabox/chat-core

      - name: Build @mediabox/core
        run: npm run build -w @mediabox/core

      - name: Test @mediabox/core
        run: npm run test -w @mediabox/core

      - name: Build mediabox-mcp
        run: npm run build -w mediabox-mcp

      - name: Build mcp-telegram-client
        run: npm run build -w mcp-telegram-client

      - name: Build create-mediabox
        run: npm run build -w create-mediabox

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Production dependency gate. Scoped to --omit=dev because dev/build-chain
      # advisories (vitest, esbuild, vite dev server) never ship in the runtime
      # image and drift over time as new CVEs publish. A production high/critical
      # advisory fails the build; remediate it in a dependency PR.
      - name: Audit (production deps)
        run: npm audit --workspaces --omit=dev --audit-level=high

  docker-build:
    # Smoke test that prevents the regression that prompted P0.3: a Dockerfile
    # that compiles in isolation but fails against the monorepo workspace
    # layout. Builds amd64 only here (publish workflow handles multi-arch).
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build mcp-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: mediabox-mcp:ci
          cache-from: type=gha,scope=ci-mediabox-mcp
          cache-to: type=gha,scope=ci-mediabox-mcp,mode=max

      - name: Smoke test mcp-server (/health)
        run: |
          docker run --rm -d --name mcp-ci -p 3000:3000 \
            -e INTERNAL_API_KEY=ci-test mediabox-mcp:ci
          # Container needs a few seconds for express to bind. Poll instead of
          # sleeping a fixed window so the job stays fast on warm caches.
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:3000/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done
          cat /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
          docker logs mcp-ci | tail -20
          docker stop mcp-ci

      - name: Build mediabox-telegram
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/mcp-telegram-client/Dockerfile
          platforms: linux/amd64
          push: false
          tags: mediabox-telegram:ci
          cache-from: type=gha,scope=ci-mediabox-telegram
          cache-to: type=gha,scope=ci-mediabox-telegram,mode=max
