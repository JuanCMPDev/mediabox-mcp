name: Release

# Push a tag like `v2.2.0-beta.1` to trigger a multi-platform Desktop App
# release. Each runner builds its own native sidecar (`bun build --compile`)
# and Tauri bundle, then `tauri-action` attaches the artifacts to the GitHub
# Release for the tag (creating it on the first runner that finishes).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — `macos-13` (Intel) was retired by GH on 2025-12-04, so we
          # build a Universal binary on the Apple Silicon runner instead. It
          # runs natively on both M-series and Intel Macs (Apple's recommended
          # path since 2020). Tauri requires a sidecar per arch; we build both
          # via Bun (cross-compile from a single host) and lipo handles the rest.
          - platform: macos-latest
            target: aarch64-apple-darwin
            extraTarget: x86_64-apple-darwin
            args: '--target universal-apple-darwin'
          # AppImage is currently disabled — linuxdeploy fails silently in CI
          # under Tauri 2 even with libfuse2 + APPIMAGE_EXTRACT_AND_RUN. Ship
          # `.deb` only for now; revisit AppImage support once upstream is
          # stable. Debian/Ubuntu (the largest Linux desktop slice) get a
          # working installer either way.
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            extraTarget: ''
            args: '--bundles deb'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            extraTarget: ''
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            libfuse2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add extra Rust target (universal builds)
        if: matrix.extraTarget != ''
        run: rustup target add ${{ matrix.extraTarget }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache the Cargo build cache scoped per OS to keep Tauri rebuilds fast.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install npm workspaces
        run: npm ci

      # ── Build the workspace dependency graph in order ────────────────────
      # @mediabox/contracts → chat-core / core → mcp-server → ui
      # The sidecar bundles `mcp-server`, so it has to compile first.
      - name: Build @mediabox/contracts
        run: npm run build -w @mediabox/contracts

      - name: Build @mediabox/chat-core
        run: npm run build -w @mediabox/chat-core

      - name: Build @mediabox/core
        run: npm run build -w @mediabox/core

      - name: Build mediabox-mcp (sidecar source)
        run: npm run build -w mediabox-mcp

      - name: Build @mediabox/ui (frontend dist)
        run: npm run build -w @mediabox/ui

      # Compiles `mcp-server` into a single executable named
      # `mediabox-mcp-<host-triple>(.exe)` under packages/desktop/src-tauri/binaries/
      # — exactly where Tauri looks for it via tauri.conf.json#bundle.externalBin.
      - name: Build sidecar (host triple)
        run: npm run sidecar:build

      # For Universal macOS builds we compile the sidecar for BOTH arches and
      # lipo them into a single fat Mach-O. Tauri 2 expects exactly one
      # sidecar named `mediabox-mcp-universal-apple-darwin` for universal
      # bundles — it does NOT lipo per-arch sidecars on its own.
      - name: Build sidecar (extra triple, for universal)
        if: matrix.extraTarget != ''
        env:
          TAURI_TARGET: ${{ matrix.extraTarget }}
        run: npm run sidecar:build

      - name: Lipo sidecars into universal Mach-O
        if: matrix.platform == 'macos-latest'
        working-directory: packages/desktop/src-tauri/binaries
        run: |
          lipo -create \
            -output mediabox-mcp-universal-apple-darwin \
            mediabox-mcp-aarch64-apple-darwin \
            mediabox-mcp-x86_64-apple-darwin
          chmod +x mediabox-mcp-universal-apple-darwin
          file mediabox-mcp-universal-apple-darwin

      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GH Actions runners have no FUSE — tell linuxdeploy/AppImage to
          # extract and run instead of mounting. Harmless on Win/macOS.
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Mediabox OS ${{ github.ref_name }}'
          releaseBody: |
            Self-hosted media stack with AI-powered management.

            ### Install
            - **Windows:** download the `.msi` or `-setup.exe`
            - **macOS (Universal — Apple Silicon + Intel):** download the `universal.dmg`
            - **Linux (Debian/Ubuntu):** `.deb`

            > Beta builds are unsigned. Windows SmartScreen and macOS Gatekeeper
            > will warn on first launch — open via right-click → Open on macOS,
            > or "More info → Run anyway" on Windows.

            See the [docs](https://github.com/JuanCMPDev/mediabox-mcp/blob/master/docs/README.en.md)
            for setup, or run `npx create-mediabox` for a headless install.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
